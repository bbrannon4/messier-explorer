<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Messier Sky Chart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #0B1426;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
    }
    h1 {
      font-family: Georgia, 'Times New Roman', Times, serif;
      color: white;
    }
    hr { border-color: #2a3a60; }

    .filter-card {
      background-color: #1a2540;
      border-color: #2a3a60;
    }
    .filter-card .card-header {
      background-color: #1a2540;
      border-bottom-color: #2a3a60;
      padding: 0;
    }
    .filter-card .card-body {
      background-color: #1a2540;
    }

    .collapse-toggle {
      color: #aabbcc;
      text-decoration: none;
      width: 100%;
      text-align: left;
      padding: 0.5rem;
      border: none;
      background: none;
      font-family: Arial, Helvetica, sans-serif;
    }
    .collapse-toggle:hover { color: white; }

    .filter-scroll {
      max-height: 250px;
      overflow-y: auto;
    }
    .filter-scroll::-webkit-scrollbar { width: 6px; }
    .filter-scroll::-webkit-scrollbar-track { background: #1a2540; }
    .filter-scroll::-webkit-scrollbar-thumb { background: #4a5a80; border-radius: 3px; }

    .form-check-label { color: #cccccc; font-size: 0.85rem; }
    .form-check-input {
      background-color: #2a3a60;
      border-color: #4a5a80;
    }
    .form-check-input:checked {
      background-color: #0d6efd;
      border-color: #0d6efd;
    }

    #object-count { color: #87ceeb; font-size: 0.82rem; }
    #sky-chart { background-color: #0B1426; }

    .control-bar {
      background: #131f38;
      border: 1px solid #2a3a60;
      border-radius: 6px;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 14px;
    }
    .ctrl-divider { width: 1px; height: 20px; background: #2a3a60; flex-shrink: 0; }
    .control-bar .form-check-label { font-size: 0.82rem; }

    .location-bar {
      background: #131f38;
      border: 1px solid #2a3a60;
      border-radius: 6px;
      padding: 7px 14px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    #loading-msg {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 400px;
      color: #87ceeb;
      font-size: 1.2rem;
    }

    /* ── Detail panel ── */
    #detail-panel {
      position: fixed;
      top: 0;
      right: -420px;
      width: 380px;
      max-width: 100%;
      height: 100vh;
      background: #111d35;
      border-left: 2px solid #2a3a60;
      z-index: 1050;
      transition: right 0.25s ease;
      overflow-y: auto;
      box-shadow: -4px 0 28px rgba(0,0,0,0.65);
    }
    #detail-panel.open { right: 0; }
    #panel-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1040;
    }
    #panel-backdrop.open { display: block; }
    .stat-card {
      background: #1a2540;
      border: 1px solid #2a3a60;
      border-radius: 4px;
      padding: 8px 10px;
    }
    .stat-label {
      color: #87ceeb;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 2px;
    }
    .stat-value {
      color: white;
      font-size: 0.85rem;
      font-family: Arial, Helvetica, sans-serif;
    }
  </style>
</head>
<body>
  <div class="container-fluid py-4">
    <div class="row">
      <div class="col-12">

        <h1 class="text-center mb-3">Interactive Messier Sky Chart</h1>
        <hr class="mb-3">

        <!-- Control bar -->
        <div class="row mb-3">
          <div class="col-12">
            <div class="control-bar">
              <span style="color:#aabbcc; font-size:0.78rem; white-space:nowrap;">Projection</span>
              <div class="btn-group btn-group-sm" role="group" aria-label="Map projection">
                <input type="radio" class="btn-check" name="projection" id="proj-equirect" value="equirectangular" autocomplete="off" checked>
                <label class="btn btn-outline-light" for="proj-equirect" style="font-size:0.78rem; padding:3px 9px;">Equirect</label>
                <input type="radio" class="btn-check" name="projection" id="proj-mollweide" value="mollweide" autocomplete="off">
                <label class="btn btn-outline-light" for="proj-mollweide" style="font-size:0.78rem; padding:3px 9px;">Mollweide</label>
                <input type="radio" class="btn-check" name="projection" id="proj-stereo" value="stereographic" autocomplete="off">
                <label class="btn btn-outline-light" for="proj-stereo" style="font-size:0.78rem; padding:3px 9px;">Stereo</label>
              </div>

              <div class="ctrl-divider"></div>

              <div class="form-check mb-0">
                <input class="form-check-input" type="checkbox" id="show-star-labels" checked>
                <label class="form-check-label" for="show-star-labels">Star labels</label>
              </div>
              <div class="form-check mb-0">
                <input class="form-check-input" type="checkbox" id="show-constellation-lines" checked>
                <label class="form-check-label" for="show-constellation-lines">Const. lines</label>
              </div>
              <div class="form-check mb-0">
                <input class="form-check-input" type="checkbox" id="show-constellation-names" checked>
                <label class="form-check-label" for="show-constellation-names">Const. names</label>
              </div>
              <div class="form-check mb-0">
                <input class="form-check-input" type="checkbox" id="scale-by-magnitude">
                <label class="form-check-label" for="scale-by-magnitude">Scale by magnitude</label>
              </div>

              <div class="ctrl-divider"></div>

              <div class="form-check form-switch mb-0">
                <input class="form-check-input" type="checkbox" id="tonights-sky-mode" role="switch">
                <label class="form-check-label" for="tonights-sky-mode" style="color:#87ceeb;">Tonight's Sky</label>
              </div>

              <div class="ms-auto d-flex gap-2">
                <button class="btn btn-outline-secondary btn-sm" id="expand-all" style="font-size:0.75rem; padding:3px 9px;">Expand filters</button>
                <button class="btn btn-outline-secondary btn-sm" id="collapse-all" style="font-size:0.75rem; padding:3px 9px;">Collapse</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Filter cards -->
        <div class="row mb-2 g-2">
          <!-- Object Types -->
          <div class="col-md-3 col-sm-6">
            <div class="card filter-card h-100">
              <div class="card-header">
                <button class="collapse-toggle" data-bs-toggle="collapse" data-bs-target="#type-collapse" aria-expanded="false">
                  <span class="toggle-icon" id="type-icon">▶ </span>
                  <strong>Object Types</strong>
                  <span class="badge bg-primary ms-2" id="type-badge">0</span>
                </button>
              </div>
              <div class="collapse" id="type-collapse">
                <div class="card-body p-2">
                  <div class="btn-group btn-group-sm mb-2">
                    <button class="btn btn-outline-primary btn-sm" id="select-all-types">All</button>
                    <button class="btn btn-outline-secondary btn-sm" id="deselect-all-types">None</button>
                  </div>
                  <div id="type-checkboxes" class="filter-scroll"></div>
                </div>
              </div>
            </div>
          </div>

          <!-- Constellations -->
          <div class="col-md-3 col-sm-6">
            <div class="card filter-card h-100">
              <div class="card-header">
                <button class="collapse-toggle" data-bs-toggle="collapse" data-bs-target="#const-collapse" aria-expanded="false">
                  <span class="toggle-icon" id="const-icon">▶ </span>
                  <strong>Constellations</strong>
                  <span class="badge bg-primary ms-2" id="const-badge">0</span>
                </button>
              </div>
              <div class="collapse" id="const-collapse">
                <div class="card-body p-2">
                  <div class="btn-group btn-group-sm mb-2">
                    <button class="btn btn-outline-primary btn-sm" id="select-all-const">All</button>
                    <button class="btn btn-outline-secondary btn-sm" id="deselect-all-const">None</button>
                  </div>
                  <div id="const-checkboxes" class="filter-scroll"></div>
                </div>
              </div>
            </div>
          </div>

          <!-- Best Viewing -->
          <div class="col-md-3 col-sm-6">
            <div class="card filter-card h-100">
              <div class="card-header">
                <button class="collapse-toggle" data-bs-toggle="collapse" data-bs-target="#season-collapse" aria-expanded="false">
                  <span class="toggle-icon" id="season-icon">▶ </span>
                  <strong>Best Viewing</strong>
                  <span class="badge bg-primary ms-2" id="season-badge">0</span>
                </button>
              </div>
              <div class="collapse" id="season-collapse">
                <div class="card-body p-2">
                  <div class="btn-group btn-group-sm mb-2">
                    <button class="btn btn-outline-primary btn-sm" id="select-all-seasons">All</button>
                    <button class="btn btn-outline-secondary btn-sm" id="deselect-all-seasons">None</button>
                  </div>
                  <div id="season-checkboxes" class="filter-scroll"></div>
                </div>
              </div>
            </div>
          </div>

          <!-- Magnitude -->
          <div class="col-md-3 col-sm-6">
            <div class="card filter-card h-100">
              <div class="card-header">
                <button class="collapse-toggle" data-bs-toggle="collapse" data-bs-target="#mag-collapse" aria-expanded="false">
                  <span class="toggle-icon" id="mag-icon">▶ </span>
                  <strong>Magnitude</strong>
                </button>
              </div>
              <div class="collapse" id="mag-collapse">
                <div class="card-body p-2">
                  <div class="d-flex align-items-center gap-2 mb-2">
                    <span style="color:#aabbcc; font-size:0.75rem; min-width:1.6rem;">Min</span>
                    <span id="mag-min-label" style="color:white; font-size:0.8rem; min-width:2rem; text-align:right;">0.0</span>
                    <input type="range" class="form-range" id="mag-min" min="0" max="12" step="0.1" value="0" style="flex:1; accent-color:#0d6efd;">
                  </div>
                  <div class="d-flex align-items-center gap-2">
                    <span style="color:#aabbcc; font-size:0.75rem; min-width:1.6rem;">Max</span>
                    <span id="mag-max-label" style="color:white; font-size:0.8rem; min-width:2rem; text-align:right;">12.0</span>
                    <input type="range" class="form-range" id="mag-max" min="0" max="12" step="0.1" value="12" style="flex:1; accent-color:#0d6efd;">
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Tonight's Sky location bar (shown when toggle is on) -->
        <div id="location-bar" class="row mb-2" style="display:none;">
          <div class="col-12">
            <div class="location-bar">
              <span id="location-status" style="color:#87ceeb; font-size:0.85rem;"></span>
              <span id="location-time" style="color:#aabbcc; font-size:0.8rem;"></span>
              <div class="input-group input-group-sm ms-auto" style="width:auto; flex-wrap:nowrap;">
                <span class="input-group-text" style="background:#1a2540;border-color:#2a3a60;color:#aabbcc;font-size:0.78rem;">Lat</span>
                <input type="number" class="form-control" id="manual-lat" placeholder="40.7" min="-90" max="90" step="0.1" style="background:#1a2540;border-color:#2a3a60;color:white;width:72px;font-size:0.78rem;">
                <span class="input-group-text" style="background:#1a2540;border-color:#2a3a60;color:#aabbcc;font-size:0.78rem;">Lon</span>
                <input type="number" class="form-control" id="manual-lon" placeholder="-74.0" min="-180" max="180" step="0.1" style="background:#1a2540;border-color:#2a3a60;color:white;width:82px;font-size:0.78rem;">
                <button class="btn btn-primary btn-sm" id="apply-location" style="font-size:0.78rem;">Apply</button>
                <button class="btn btn-outline-secondary btn-sm" id="detect-location" style="font-size:0.78rem;" title="Request location from browser">📍 Detect</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Object count -->
        <div class="row mb-2">
          <div class="col-12 px-1">
            <span id="object-count" style="padding-left:4px;">Loading catalog…</span>
          </div>
        </div>

        <!-- Chart -->
        <div class="row">
          <div class="col-12">
            <div id="sky-chart" style="height: 800px;">
              <div id="loading-msg">Loading star chart…</div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Object detail panel -->
  <div id="detail-panel">
    <div style="display:flex; justify-content:space-between; align-items:flex-start; padding:16px 16px 8px;">
      <div>
        <div id="panel-messier-num" style="color:#87ceeb; font-size:0.78rem; letter-spacing:0.08em; text-transform:uppercase; font-family:Arial,Helvetica,sans-serif;"></div>
        <h5 id="panel-title" style="color:white; font-family:Georgia,'Times New Roman',serif; margin:3px 0 0; font-size:1.15rem; line-height:1.3;"></h5>
      </div>
      <button id="close-panel" aria-label="Close" style="background:none; border:none; color:#aabbcc; font-size:1.8rem; line-height:1; cursor:pointer; padding:0 0 0 16px; flex-shrink:0; margin-top:-4px;">&#x2715;</button>
    </div>

    <div style="padding:0 16px 14px;">
      <div id="panel-image-placeholder" style="height:180px; background:#1a2540; border:1px solid #2a3a60; border-radius:6px; display:flex; align-items:center; justify-content:center; color:#4a5a80; font-size:0.85rem; font-family:Arial,Helvetica,sans-serif;">Loading…</div>
      <img id="panel-image" src="" alt="" style="width:100%; border-radius:6px; display:none; max-height:300px; object-fit:cover;">
    </div>

    <div id="panel-stats" style="padding:0 16px 14px; display:grid; grid-template-columns:1fr 1fr; gap:8px;"></div>

    <p id="panel-description" style="padding:0 16px 14px; color:#cccccc; font-size:0.85rem; line-height:1.55; font-family:Arial,Helvetica,sans-serif; margin:0;"></p>

    <div style="padding:0 16px 28px;">
      <a id="panel-wiki-link" href="#" target="_blank" rel="noopener noreferrer" style="color:#87ceeb; font-size:0.85rem; display:none; font-family:Arial,Helvetica,sans-serif;">Read more on Wikipedia &#8594;</a>
    </div>
  </div>
  <div id="panel-backdrop"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
